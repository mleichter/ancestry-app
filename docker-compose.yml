services:
  backend:
    build:
      context: ./backend
      target: prod
    # No host port — only the frontend container on the bridge network can reach the API
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://familytree:${DB_PASSWORD}@db:5432/familytree
      MEDIA_STORAGE_PATH: /data/media
    volumes:
      - media_data:/data/media
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    security_opt:
      - apparmor=unconfined

  frontend:
    build:
      context: ./frontend
      target: prod
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    security_opt:
      - apparmor=unconfined

  db:
    image: postgres:16-alpine
    env_file: .env
    environment:
      POSTGRES_DB: familytree
      POSTGRES_USER: familytree
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U familytree"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    security_opt:
      - apparmor=unconfined

volumes:
  pg_data:
  media_data:
