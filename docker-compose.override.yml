services:
  backend:
    image: ancestry-app-backend:dev
    build:
      context: ./backend
      target: dev
    command: uvicorn app.main:app --reload --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: ancestry-app-frontend:dev
    build:
      context: ./frontend
      target: dev
    command: npm run dev -- --host 0.0.0.0
    environment:
      VITE_API_URL: http://backend:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
